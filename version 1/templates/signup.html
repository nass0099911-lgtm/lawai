<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nýskráning - Lögvist</title>
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="aura-bg-container">
        <div class="aura-energy"></div>
        <div class="aura-grid"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="aura-logo" style="width: 64px; height: 64px; margin-bottom: 16px;">
                    <img src="/static/logo.png" alt="Lögvist Logo" style="width: 100%; height: 100%; border-radius: 12px; object-fit: cover;">
                </div>
                <h2>Ganga í Lögvist</h2>
                <p>Stofna nýjan aðgang</p>
            </div>
            
            {% if error %}
            <div class="server-error">{{ error }}</div>
            {% endif %}
            
            <form class="login-form" method="POST" action="/signup">
                <div class="form-group">
                    <div class="aura-input-wrapper">
                        <input type="text" id="username" name="username" required autocomplete="username" placeholder=" ">
                        <label for="username">Notendanafn</label>
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="aura-input-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="new-password" placeholder=" ">
                        <label for="password">Lykilorð</label>
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0110 0v4"/>
                            </svg>
                        </div>
                    </div>
                    
                    <div class="password-strength-container" style="display: none; margin-top: 10px; font-size: 13px;">
                        <div style="display: flex; gap: 5px; height: 4px; margin-bottom: 5px;">
                            <div class="strength-bar" id="bar-1" style="flex: 1; background: #333; border-radius: 2px;"></div>
                            <div class="strength-bar" id="bar-2" style="flex: 1; background: #333; border-radius: 2px;"></div>
                            <div class="strength-bar" id="bar-3" style="flex: 1; background: #333; border-radius: 2px;"></div>
                        </div>
                        <div id="strength-text" style="color: #ef4444; font-weight: bold; margin-bottom: 2px;">Veikt</div>
                        <div id="strength-suggestion" style="color: var(--text-secondary); font-size: 12px;">Bættu við hástöfum, tölum og sérstöfum.</div>
                    </div>
                </div>

                <button type="submit" class="aura-btn">
                    <span>Nýskráning</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>

                <button type="button" class="google-btn" id="googleLoginBtn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                    </svg>
                    <span>Tengjast með Google</span>
                </button>
            </form>

            <div class="signup-link">
                <p>Ertu þegar með reikning? <a href="/login">Skrá inn</a></p>
            </div>
        </div>
    </div>

    <script src="/static/security.js"></script>
    <script>
        document.getElementById('googleLoginBtn')?.addEventListener('click', () => {
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            const googleUsername = 'google_notandi_' + randomNum;
            
            const signupForm = document.createElement('form');
            signupForm.method = 'POST';
            signupForm.action = '/signup';
            
            const userInput = document.createElement('input');
            userInput.type = 'hidden';
            userInput.name = 'username';
            userInput.value = googleUsername;
            signupForm.appendChild(userInput);
            
            const passInput = document.createElement('input');
            passInput.type = 'hidden';
            passInput.name = 'password';
            passInput.value = 'google_secure_password_123';
            signupForm.appendChild(passInput);
            
            document.body.appendChild(signupForm);
            signupForm.submit();
        });

        // Password strength logic
        const pwdInput = document.getElementById('password');
        const usernameInput = document.getElementById('username');
        const strengthContainer = document.querySelector('.password-strength-container');
        const bar1 = document.getElementById('bar-1');
        const bar2 = document.getElementById('bar-2');
        const bar3 = document.getElementById('bar-3');
        const strengthText = document.getElementById('strength-text');
        const strengthSuggestion = document.getElementById('strength-suggestion');
        const submitBtn = document.querySelector('.aura-btn');

        pwdInput.addEventListener('input', () => {
            const val = pwdInput.value;
            if (!val) {
                strengthContainer.style.display = 'none';
                submitBtn.disabled = true;
                return;
            }
            
            strengthContainer.style.display = 'block';
            let score = 0;
            let suggestions = [];
            
            if (val.length >= 10) score += 1;
            else suggestions.push("Lykilorð verður að vera a.m.k. 10 stafir");
            
            if (/[A-Z]/.test(val)) score += 1;
            else suggestions.push("Vantar hástaf");
            
            if (/[a-z]/.test(val)) score += 1;
            
            if (/[0-9]/.test(val)) score += 1;
            else suggestions.push("Vantar tölu");
            
            if (/[!@#$%^&*()\-_=+[\]{}|;:,.<>?]/.test(val)) score += 1;
            else suggestions.push("Vantar sérstaf");
            
            const uname = usernameInput.value.toLowerCase();
            if (uname && val.toLowerCase().includes(uname) && uname.length > 3) {
                score = 0;
                suggestions = ["Má ekki innihalda notendanafn"];
            }
            
            // Repeating chars
            if (/(.)\1{4,}/.test(val)) {
                score = 0;
                suggestions = ["Of margir endurteknir stafir"];
            }

            bar1.style.background = '#333';
            bar2.style.background = '#333';
            bar3.style.background = '#333';

            if (score <= 2) {
                bar1.style.background = '#ef4444'; // Red
                strengthText.textContent = 'Veikt';
                strengthText.style.color = '#ef4444';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
            } else if (score <= 4) {
                bar1.style.background = '#f59e0b'; // Yellow
                bar2.style.background = '#f59e0b';
                strengthText.textContent = 'Sæmilegt';
                strengthText.style.color = '#f59e0b';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
            } else {
                bar1.style.background = '#10b981'; // Green
                bar2.style.background = '#10b981';
                bar3.style.background = '#10b981';
                strengthText.textContent = 'Sterkt';
                strengthText.style.color = '#10b981';
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                suggestions = ["Lykilorð uppfyllir öll skilyrði!"];
            }
            
            strengthSuggestion.textContent = suggestions.join(' • ');
        });
        
        // Initial disable
        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.5';
    </script>
</body>
</html>
