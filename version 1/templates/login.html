<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innskráning - Lögvist</title>
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="aura-bg-container">
        <div class="aura-energy"></div>
        <div class="aura-grid"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="aura-logo" style="width: 64px; height: 64px; margin-bottom: 16px;">
                    <img src="/static/logo.png" alt="Lögvist Logo" style="width: 100%; height: 100%; border-radius: 12px; object-fit: cover;">
                </div>
                <h2>Lögvist AI</h2>
                <p>Íslenskur Lögfræðiaðstoðarmaður</p>
            </div>
            
            {% if error %}
            <div class="server-error">{{ error }}</div>
            {% endif %}
            
            <form class="login-form" id="loginForm" method="POST" action="/login">
                <div class="form-group">
                    <div class="aura-input-wrapper">
                        <input type="text" id="username" name="username" required autocomplete="username" placeholder=" ">
                        <label for="username">Notendanafn</label>
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="aura-input-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder=" ">
                        <label for="password">Lykilorð</label>
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0110 0v4"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <button type="submit" class="aura-btn">
                    <span>Skrá inn</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>

                <a href="/login/google" class="google-btn" id="googleLoginBtn" style="display:flex; justify-content:center; align-items:center; text-decoration:none;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="margin-right: 8px;">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                    </svg>
                    <span>Tengjast með Google</span>
                </a>
            </form>

            <div class="signup-link">
                <p>Nýr notandi? <a href="/signup">Stofna reikning</a></p>
            </div>
        </div>
    </div>

    <script src="/static/security.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', () => {
            const btn = form.querySelector('.aura-btn');
            btn.style.opacity = '0.7';
            btn.querySelector('span').textContent = 'Auðkennir...';
        });
    </script>
</body>
</html>
